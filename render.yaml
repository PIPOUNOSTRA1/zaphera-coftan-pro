services:
  # Full-Stack Web Service (Backend serves Frontend)
  - type: web
    name: zaphera-caftan
    env: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: "https://zephira-caftan.shop,https://www.zephira-caftan.shop"
      # Google Sheets Configurations
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_SPREADSHEET_ID
        sync: false
      # Meta Configurations
      - key: META_PIXEL_ID
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      # TikTok Configurations
      - key: TIKTOK_PIXEL_ID
        sync: false
      - key: TIKTOK_ACCESS_TOKEN
        sync: false
      # Snapchat Configurations
      - key: SNAP_PIXEL_ID
        sync: false
      - key: SNAP_ACCESS_TOKEN
        sync: false
